name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver tags only: v0.1.0, v1.2.3, etc.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (must already exist)'
        required: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release mid-publish

jobs:
  verify-version:
    name: Verify tag matches build.zig.zon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - name: Compare tag to package version
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          tag="${tag#v}"
          zon_version=$(grep -oP '\.version\s*=\s*"\K[^"]+' build.zig.zon)
          if [[ "$tag" != "$zon_version" ]]; then
            echo "Tag v$tag does not match build.zig.zon version $zon_version" >&2
            exit 1
          fi

  build:
    name: Build / ${{ matrix.target }}
    needs: verify-version
    runs-on: ubuntu-latest   # Zig cross-compiles everything from Linux
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-musl     # Static binary — runs on any x86_64 Linux
            artifact: zroute-x86_64-linux
          - target: aarch64-linux-musl    # Static binary — Raspberry Pi, AWS Graviton, etc.
            artifact: zroute-aarch64-linux
          - target: x86_64-macos
            artifact: zroute-x86_64-macos
          - target: aarch64-macos         # Apple Silicon
            artifact: zroute-aarch64-macos
          # - target: x86_64-windows-gnu
          #   artifact: zroute-x86_64-windows.exe

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: "0.16.0"

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe

      # Normalise the binary name so the release page is clean.
      - name: Stage artifact
        run: |
          src="zig-out/bin/zroute"
          [[ "${{ matrix.target }}" == *windows* ]] && src="${src}.exe"
          mkdir -p dist
          cp "$src" "dist/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

      # sbom-action's `path` input is always scanned as a directory source,
      # so it must point at a dir, not the binary file itself.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: dist
          format: spdx-json
          output-file: ${{ matrix.artifact }}.spdx.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.artifact }}.spdx.json
          path: ${{ matrix.artifact }}.spdx.json
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # Required to create the GitHub release
      id-token: write   # Required for cosign keyless (OIDC) signing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true
          path: artifacts/

      - name: Verify artifacts
        run: ls -lh artifacts/

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless signing via GitHub OIDC — no key material to manage or leak.
      # Verify with: cosign verify-blob --certificate-identity-regexp '...'
      #   --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign checksums with cosign
        working-directory: artifacts
        run: |
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            checksums.txt

      # Uses the built-in gh CLI — no third-party action required.
      # --generate-notes auto-populates the release body from PR/commit history.
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          [[ "$tag" == "" ]] && tag="${{ inputs.tag }}"
          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "$tag" \
            --generate-notes \
            artifacts/*
