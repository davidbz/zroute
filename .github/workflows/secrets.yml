name: Secret Scanning

on:
  pull_request:
    branches: [main]
  # Weekly full-history scan catches secrets committed before this workflow existed.
  schedule:
    - cron: '0 3 * * 1'   # 03:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required for accurate scanning

      # On PRs: scan only the commits in this PR (base → head).
      # On schedule/manual: scan the full history.
      - uses: trufflesecurity/trufflehog@v3
        with:
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: --only-verified
