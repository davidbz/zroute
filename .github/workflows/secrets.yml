name: Secret Scanning

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secrets-scanner:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Secret Scanning
      uses: trufflesecurity/trufflehog@main
      with:
        extra_args: --results=verified,unknown
