name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly full-history scan catches secrets committed before this workflow existed.
  schedule:
    - cron: '0 3 * * 1'   # 03:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history — partial clone misses historical leaks

      # Gitleaks scans the entire git history for secrets (API keys, tokens,
      # private keys, etc.). GITLEAKS_LICENSE is only required for org-level
      # features; leave the secret unset for public/personal repos.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
