name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch; never cancel on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Minimum required permissions; jobs that need more declare it explicitly.
permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - name: Check formatting
        run: zig fmt --check src/

  test:
    name: Test / ${{ matrix.os }} / Zig ${{ matrix.zig }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # Report all failures, not just the first one
      matrix:
        os: [ubuntu-latest] #os: [ubuntu-latest, ubuntu-latest]
        zig: ["0.16.0"] #zig: ["0.16.0", "master"]   # master catches upstream breakage early
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}
      # Cache the Zig build cache to speed up incremental builds.
      # Key includes the zon hash so a dep change busts it correctly.
      - uses: actions/cache@v6
        with:
          path: |
            .zig-cache
            ~/.cache/zig
            ~/Library/Caches/zig
          key: zig-${{ runner.os }}-${{ matrix.zig }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ matrix.zig }}-
            zig-${{ runner.os }}-
      - name: Compile check
        run: zig build check
      - name: Run tests
        run: zig build test

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - uses: actions/cache@v6
        with:
          path: |
            .zig-cache
            ~/.cache/zig
            ~/Library/Caches/zig
          key: zig-${{ runner.os }}-0.16.0-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-0.16.0-
            zig-${{ runner.os }}-
      - name: Build
        run: zig build
      - name: Run end-to-end tests
        run: python3 test/e2e_test.py
