name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch; never cancel on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Minimum required permissions; jobs that need more declare it explicitly.
permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - name: Check formatting
        run: zig fmt --check src/

  test:
    name: Test / ${{ matrix.os }} / Zig ${{ matrix.zig }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # Report all failures, not just the first one
      matrix:
        os: [ubuntu-latest] #os: [ubuntu-latest, ubuntu-latest]
        zig: ["0.16.0"] #zig: ["0.16.0", "master"]   # master catches upstream breakage early
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}
      # Cache the Zig build cache to speed up incremental builds.
      # Key includes the zon hash so a dep change busts it correctly.
      - uses: actions/cache@v5
        with:
          path: |
            .zig-cache
            ~/.cache/zig
            ~/Library/Caches/zig
          key: zig-${{ runner.os }}-${{ matrix.zig }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ matrix.zig }}-
            zig-${{ runner.os }}-
      - name: Compile check
        run: zig build check
      - name: Run tests
        run: zig build test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - uses: actions/cache@v5
        with:
          path: |
            .zig-cache
            ~/.cache/zig
          key: zig-${{ runner.os }}-0.16.0-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-0.16.0-
            zig-${{ runner.os }}-
      - name: Install kcov
        run: sudo apt-get update && sudo apt-get install -y kcov
      - name: Generate coverage report
        run: zig build coverage
      - name: Summarize coverage
        run: |
          report="zig-out/coverage/kcov-merged/coverage.json"
          if [ ! -f "$report" ]; then
            echo "::error::kcov did not produce a merged coverage report at $report"
            exit 1
          fi
          pct=$(python3 -c "import json; print(json.load(open('$report'))['percent_covered'])")
          echo "Line coverage: ${pct}%"
          echo "### Code coverage: ${pct}%" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: zig-out/coverage/kcov-merged
