name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - name: Check formatting
        run: zig fmt --check src/

  lint-py:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright

  test:
    name: Test / ${{ matrix.os }} / Zig ${{ matrix.zig }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest] #os: [ubuntu-latest, ubuntu-latest]
        zig: ["0.16.0"]
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}
      # Cache the Zig build cache to speed up incremental builds.
      # Key includes the zon hash so a dep change busts it correctly.
      - uses: actions/cache@v6
        with:
          path: |
            .zig-cache
            ~/.cache/zig
            ~/Library/Caches/zig
          key: zig-${{ runner.os }}-${{ matrix.zig }}-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ matrix.zig }}-
            zig-${{ runner.os }}-
      - name: Compile check
        run: zig build check
      - name: Run tests
        run: zig build test

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"
      - uses: astral-sh/setup-uv@v7
      - uses: actions/cache@v6
        with:
          path: |
            .zig-cache
            ~/.cache/zig
            ~/Library/Caches/zig
          key: zig-${{ runner.os }}-0.16.0-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            zig-${{ runner.os }}-0.16.0-
            zig-${{ runner.os }}-
      - name: Build
        run: zig build
      - name: Run end-to-end tests
        run: uv run pytest test/ -v
